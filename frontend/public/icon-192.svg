<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="orangeBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB347"/>
      <stop offset="100%" style="stop-color:#FF8C42"/>
    </linearGradient>
    <linearGradient id="orangeHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC970"/>
      <stop offset="100%" style="stop-color:#FFB347"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="192" height="192" fill="url(#orangeBody)" rx="42"/>

  <!-- 橙子主体 -->
  <circle cx="96" cy="95" r="55" fill="#FF8C42"/>

  <!-- 橙子高光 -->
  <ellipse cx="78" cy="70" rx="18" ry="25" fill="url(#orangeHighlight)" opacity="0.8"/>

  <!-- 橙子叶子 -->
  <ellipse cx="96" cy="55" rx="8" ry="20" fill="#4CAF50" transform="rotate(-15 96 55)"/>
  <ellipse cx="96" cy="55" rx="6" ry="16" fill="#66BB6A" transform="rotate(15 96 55)"/>

  <!-- 橙子凹痕 -->
  <ellipse cx="96" cy="100" rx="6" ry="10" fill="#F76B1C"/>
</svg>